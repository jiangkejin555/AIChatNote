# AI Chat Note Backend Configuration

server:
  port: "8080"
  gin_mode: "debug"  # debug or release

database:
  host: postgres
  port: 5432
  user: postgres
  password: postgres
  dbname: chat_note
  sslmode: disable
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 3600  # seconds

jwt:
  secret: "your-jwt-secret-key-at-least-32-characters-long"
  refresh_secret: "your-refresh-token-secret-key"
  expiry_hours: 24
  refresh_expiry_hours: 168

encryption:
  key: "your-32-byte-encryption-key-here"  # Must be exactly 32 bytes

cors:
  frontend_url: "http://localhost:3000"

mock:
  enabled: false  # Set to true to enable mock mode for testing without LLM API keys

title_generator:
  enabled: true  # Set to true to enable AI-powered title generation
  api_base: "https://api.deepseek.com"    # API base URL, e.g., "https://api.deepseek.com/v1"
  api_key: ""     # API key (recommend using TITLE_GENERATOR_API_KEY env var)
  model: "deepseek-chat"       # Model ID, e.g., "deepseek-chat"
  max_tokens: 50  # Maximum tokens for title generation

# Context processing configuration for conversation memory
context:
  # Default settings for new users
  default_mode: "simple"      # summary | simple
  default_level: "normal"     # short | normal | long

  # Summary mode: sliding window + compression
  # WindowAutoSize: trigger summary when messages >= this count
  # KeepRecentCount: keep this many recent messages as raw
  summary:
    short:
      window_auto_size: 10
      keep_recent_count: 5
    normal:
      window_auto_size: 20
      keep_recent_count: 10
    long:
      window_auto_size: 40
      keep_recent_count: 20
    max_tokens: 300  # Maximum tokens for summary generation

  # Simple mode: direct pass of recent messages
  # HistoryLimit: number of recent messages to pass to LLM
  simple:
    short:
      history_limit: 5
    normal:
      history_limit: 10
    long:
      history_limit: 15

