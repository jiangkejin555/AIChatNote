# AI Chat Notes Backend Configuration

server:
  port: "8080"
  gin_mode: "debug"  # debug or release

database:
  host: postgres
  port: 5432
  user: postgres
  password: postgres
  dbname: chat_note
  sslmode: disable
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 3600  # seconds

jwt:
  secret: "your-jwt-secret-key-at-least-32-characters-long"
  refresh_secret: "your-refresh-token-secret-key"
  expiry_hours: 24
  refresh_expiry_hours: 168

encryption:
  key: "your-32-byte-encryption-key-here"  # Must be exactly 32 bytes

llm:
  deepseek_api_key: "sk-5af036850f9f49ec9ba5bbcd25e5d246"  # Set your DeepSeek API key here or via environment variable
  deepseek_api_base: "https://api.deepseek.com"

cors:
  frontend_url: "http://localhost:3000"

mock:
  enabled: false  # Set to true to enable mock mode for testing without LLM API keys
