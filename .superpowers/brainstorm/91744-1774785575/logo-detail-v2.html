<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; background: #f5f5f5; color: #333; }
    .container { max-width: 800px; margin: 0 auto; }
    h2 { color: #111; }
    .cards { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
    .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); flex: 1; min-width: 200px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
    .card.selected { border-color: #3B82F6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3); }
    .card-image { background: #f0f4ff; display: flex; align-items: center; justify-content: center; padding: 30px; border-bottom: 1px solid #eee; }
    .card-body { padding: 15px; }
    .card-body h3 { margin: 0 0 10px 0; font-size: 16px; color: #111; }
    .card-body p { margin: 0; font-size: 14px; color: #666; line-height: 1.4; }
  </style>
</head>
<body>
  <div class="container">
    <h2>细化"一体化变形"方案：细节与质感</h2>
    <p>我们选择了"一体化变形"（气泡轮廓+文档内容）的方向。现在我们需要决定图形的具体线条风格和质感。点击卡片选择你喜欢的风格：</p>

    <div class="cards">
      <!-- 风格 1：实心扁平 -->
      <div class="card" onclick="document.querySelectorAll('.card').forEach(c => c.classList.remove('selected')); this.classList.add('selected'); console.log('Selected Solid');">
        <div class="card-image">
          <svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- 气泡基底 -->
            <path d="M15 30C15 21.7157 21.7157 15 30 15H90C98.2843 15 105 21.7157 105 30V80C105 88.2843 98.2843 95 90 95H40C31.7157 95 15 105 15 105V30Z" fill="#3B82F6"/>
            <!-- 内部文档线 (圆角线段) -->
            <rect x="35" y="40" width="45" height="8" rx="4" fill="white"/>
            <rect x="35" y="58" width="55" height="8" rx="4" fill="white"/>
            <rect x="35" y="76" width="30" height="8" rx="4" fill="white"/>
          </svg>
        </div>
        <div class="card-body">
          <h3>风格 1：实心扁平 (Solid)</h3>
          <p>背景实心填充品牌色，内部使用白色粗圆角线条。这种风格在小尺寸下识别度极高，适合做应用图标。</p>
        </div>
      </div>

      <!-- 风格 2：线框带点缀 -->
      <div class="card" onclick="document.querySelectorAll('.card').forEach(c => c.classList.remove('selected')); this.classList.add('selected'); console.log('Selected Outline');">
        <div class="card-image">
          <svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- 气泡线框 -->
            <path d="M15 30C15 21.7157 21.7157 15 30 15H90C98.2843 15 105 21.7157 105 30V80C105 88.2843 98.2843 95 90 95H40C31.7157 95 15 105 15 105V30Z" stroke="#3B82F6" stroke-width="8" stroke-linejoin="round"/>
            <!-- 内部文档线 -->
            <line x1="35" y1="45" x2="65" y2="45" stroke="#3B82F6" stroke-width="8" stroke-linecap="round"/>
            <line x1="35" y1="65" x2="85" y2="65" stroke="#3B82F6" stroke-width="8" stroke-linecap="round"/>
            <!-- 右上角 AI 星芒点缀 -->
            <path d="M85 25C85 25 85 35 95 35C85 35 85 45 85 45C85 45 85 35 75 35C85 35 85 25 85 25Z" fill="#3B82F6"/>
          </svg>
        </div>
        <div class="card-body">
          <h3>风格 2：线框带点缀 (Outline)</h3>
          <p>使用粗线条勾勒轮廓。额外加入了一颗"AI 星芒"点缀，强调智能属性。风格更轻盈。</p>
        </div>
      </div>

      <!-- 风格 3：微渐变与阴影 -->
      <div class="card" onclick="document.querySelectorAll('.card').forEach(c => c.classList.remove('selected')); this.classList.add('selected'); console.log('Selected Gradient');">
        <div class="card-image">
          <svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="grad" x1="15" y1="15" x2="105" y2="105" gradientUnits="userSpaceOnUse">
                <stop stop-color="#60A5FA"/>
                <stop offset="1" stop-color="#2563EB"/>
              </linearGradient>
              <filter id="shadow" x="0" y="0" width="120" height="120" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
                <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.2"/>
              </filter>
            </defs>
            <!-- 气泡基底 (渐变+阴影) -->
            <path d="M15 30C15 21.7157 21.7157 15 30 15H90C98.2843 15 105 21.7157 105 30V80C105 88.2843 98.2843 95 90 95H40C31.7157 95 15 105 15 105V30Z" fill="url(#grad)" filter="url(#shadow)"/>
            <!-- 内部文档线 (带微透明度模拟高光) -->
            <rect x="35" y="40" width="45" height="8" rx="4" fill="white" opacity="0.9"/>
            <rect x="35" y="58" width="55" height="8" rx="4" fill="white" opacity="0.75"/>
            <rect x="35" y="76" width="30" height="8" rx="4" fill="white" opacity="0.6"/>
          </svg>
        </div>
        <div class="card-body">
          <h3>风格 3：微渐变质感 (Gradient)</h3>
          <p>加入了从亮到暗的微渐变、柔和的阴影，以及内部横线的透明度变化。这种处理让图标更有层次感。</p>
        </div>
      </div>
    </div>
  </div>
  <!-- 向服务器报告状态以保持活跃 -->
  <script src="/helper.js"></script>
</body>
</html>
