  <ul style="margin: 0; padding-left: 20px; color: #555; line-height: 1.8;">
    <li><strong>整体边框</strong>：外围 5px 蓝色边框，整体像一张笔记卡片</li>
    <li><strong>上方对话</strong>：气泡填充，左上/右下直角，右上/左下圆弧</li>

    <li><strong>设计理念</strong>：对话即笔记，整体如一张带边框的卡片</li>
