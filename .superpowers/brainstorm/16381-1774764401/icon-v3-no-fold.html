<h2>图标设计 v3</h2>
<p class="subtitle">去掉折角 + 黑白/品牌色对比</p>

<h3 style="margin-top: 24px; margin-bottom: 16px;">黑白版本</h3>
<div class="cards">
  <div class="card" data-choice="bw-a" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#f5f5f5;padding:40px;display:flex;align-items:center;justify-content:center;">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <!-- 笔记文档 (底层，无折角) -->
        <rect x="30" y="25" width="70" height="80" rx="8" fill="white" stroke="#1a1a1a" stroke-width="4"/>
        <!-- 笔记内容线条 -->
        <line x1="40" y1="55" x2="90" y2="55" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
        <line x1="40" y1="70" x2="90" y2="70" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
        <line x1="40" y1="85" x2="70" y2="85" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
        <!-- 对话气泡 (上层，重叠在左上角) -->
        <path d="M15 35 Q15 15 35 15 L60 15 Q75 15 75 28 L75 48 Q75 60 60 60 L35 60 L28 75 L28 60 Q15 60 15 45 Z" fill="#1a1a1a"/>
        <circle cx="35" cy="38" r="4" fill="white"/>
        <circle cx="48" cy="38" r="4" fill="white"/>
        <circle cx="61" cy="38" r="4" fill="white"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>黑白 A</h3>
      <p>气泡重叠在笔记左上，简洁干净</p>
    </div>
  </div>

  <div class="card" data-choice="bw-b" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#f5f5f5;padding:40px;display:flex;align-items:center;justify-content:center;">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <!-- 对话气泡 (底层) -->
        <path d="M20 50 Q20 20 50 20 L85 20 Q105 20 105 40 L105 65 Q105 85 85 85 L50 85 L40 105 L40 85 Q20 85 20 60 Z" fill="#1a1a1a"/>
        <!-- 笔记文档 (上层，无折角) -->
        <rect x="50" y="35" width="55" height="60" rx="6" fill="white" stroke="#1a1a1a" stroke-width="3"/>
        <!-- 笔记内容线条 -->
        <line x1="58" y1="52" x2="98" y2="52" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="58" y1="65" x2="98" y2="65" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="58" y1="78" x2="85" y2="78" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
        <!-- 气泡上的点 -->
        <circle cx="38" cy="52" r="4" fill="white"/>
        <circle cx="52" cy="52" r="4" fill="white"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>黑白 B</h3>
      <p>大气泡底层，笔记重叠右下</p>
    </div>
  </div>

  <div class="card" data-choice="bw-c" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#f5f5f5;padding:40px;display:flex;align-items:center;justify-content:center;">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <!-- 对话气泡 (黑色) -->
        <path d="M18 45 Q18 18 45 18 L75 18 Q95 18 95 35 L95 58 Q95 75 75 75 L45 75 L38 92 L38 75 Q18 75 18 55 Z" fill="#1a1a1a"/>
        <!-- 笔记文档 (白色，无折角) -->
        <rect x="55" y="40" width="55" height="60" rx="6" fill="white" stroke="#1a1a1a" stroke-width="3"/>
        <!-- 笔记内容线条 -->
        <line x1="63" y1="58" x2="103" y2="58" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="63" y1="70" x2="103" y2="70" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="63" y1="82" x2="90" y2="82" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
        <!-- 气泡上的点 -->
        <circle cx="38" cy="46" r="4" fill="white"/>
        <circle cx="52" cy="46" r="4" fill="white"/>
        <circle cx="66" cy="46" r="4" fill="white"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>黑白 C</h3>
      <p>对角交叉，动感流动</p>
    </div>
  </div>
</div>

        <!-- 笔记内容线条 -->
        <line x1="63" y1="58" x2="103" y2="58" stroke="#0891B2" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="63" y1="70" x2="103" y2="70" stroke="#0891B2" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="63" y1="82" x2="90" y2="82" stroke="#0891B2" stroke-width="2.5" stroke-linecap="round"/>

<div class="section" style="margin-top: 24px; padding: 16px; background: #f0f9ff; border-radius: 8px;">
  <h3 style="margin-top: 0;">黑白 vs 品牌色</h3>
  <div class="pros-cons">
    <div class="pros">
      <h4>黑白</h4>
      <ul>
        <li>简洁、专业、现代</li>
        <li>适配任何主题色</li>
        <li>辨识度高（如 Notion）</li>
      </ul>
    </div>
    <div class="cons">
      <h4>品牌色</h4>
      <ul>
        <li>与 App 视觉一致</li>
        <li>更有记忆点</li>
        <li>色彩吸引注意力</li>
      </ul>
    </div>
  </div>
</div>
