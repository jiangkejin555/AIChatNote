# AI Chat Notes - API 定义
# OpenAPI 3.0 风格

openapi: 3.0.0
info:
  title: AI Chat Notes API
  version: 1.0.0
  description: AI 聊天聚合 + 知识库管理 API

servers:
  - url: /api
    description: API 路径前缀

# ============================================
# 通用定义
# ============================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ---------- 通用响应 ----------
    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT Token
        refresh_token:
          type: string
          description: 刷新令牌
        user:
          $ref: '#/components/schemas/User'

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: 错误类型
        message:
          type: string
          description: 错误详情
      required:
        - error
        - message

    SuccessResponse:
      type: object
      properties:
        message:
          type: string
          description: 成功信息
      required:
        - message

    SyncModelsResponse:
      type: object
      description: 模型同步响应
      properties:
        models:
          type: array
          items:
            $ref: '#/components/schemas/ProviderModel'
          description: 同步后的所有模型列表
        added:
          type: integer
          description: 新增的模型数量
          example: 2
        deleted:
          type: integer
          description: 删除的模型数量
          example: 1
        updated:
          type: integer
          description: 更新的模型数量（默认模型变更）
          example: 1
        enabled:
          type: integer
          description: 启用的模型数量
          example: 3
        disabled:
          type: integer
          description: 禁用的模型数量
          example: 1
      required:
        - models
        - added
        - deleted
        - updated
        - enabled
        - disabled

    ApiResponse:
      type: object
      properties:
        data:
          type: object
          description: 响应数据
      required:
        - data

    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items: {}
          description: 数据列表
        total:
          type: integer
          description: 总数量
        page:
          type: integer
          description: 当前页码
        page_size:
          type: integer
          description: 每页数量
      required:
        - data
        - total
        - page
        - page_size

    # ---------- 用户相关 ----------
    User:
      type: object
      properties:
        id:
          type: integer
          description: 用户 ID（自增）
        email:
          type: string
          format: email
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserSettings:
      type: object
      description: 用户会话设置
      properties:
        context_mode:
          type: string
          enum: [summary, simple]
          description: |
            上下文处理模式：
            - summary: 滑动窗口 + 摘要压缩策略
            - simple: 直接传递最近 N 条消息
          example: simple
        memory_level:
          type: string
          enum: [short, normal, long]
          description: |
            记忆等级：
            - short: 短期记忆（较少消息）
            - normal: 普通记忆（平衡）
            - long: 长期记忆（更多消息）
          example: normal
      required:
        - context_mode
        - memory_level

    UserSettingsResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/UserSettings'

    UpdateUserSettingsRequest:
      type: object
      properties:
        context_mode:
          type: string
          enum: [summary, simple]
          description: 上下文处理模式
        memory_level:
          type: string
          enum: [short, normal, long]
          description: 记忆等级

    # ---------- 模型相关（已废弃） ----------
    Model:
      type: object
      deprecated: true
      properties:
        id:
          type: integer
        user_id:
          type: integer
        name:
          type: string
          description: 显示名称
        api_base:
          type: string
          description: API 地址
        api_key:
          type: string
          description: API Key（仅创建/更新时传入，返回时隐藏）
        model_name:
          type: string
          description: 实际模型名
        is_default:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ---------- 提供商相关 ----------
    ProviderType:
      type: string
      enum:
        - openai
        - volcengine
        - deepseek
        - anthropic
        - google
        - moonshot
        - zhipu
        - custom
      description: |
        提供商类型：
        - openai: OpenAI GPT 系列
        - volcengine: 火山引擎 Doubao
        - deepseek: 深度求索
        - anthropic: Anthropic Claude
        - google: Google Gemini
        - moonshot: 月之暗面 Kimi
        - zhipu: 智谱 GLM
        - custom: 自定义 OpenAI 兼容接口

    Provider:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: 用户自定义显示名称（如 "OpenAI (个人)"）
        type:
          $ref: '#/components/schemas/ProviderType'
        api_base:
          type: string
          description: API 基础地址
        models:
          type: array
          items:
            $ref: '#/components/schemas/ProviderModel'
          description: 关联的模型列表
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProviderModel:
      type: object
      properties:
        id:
          type: string
          format: uuid
        provider_id:
          type: string
          format: uuid
        model_id:
          type: string
          description: API 返回的模型标识（如 gpt-4o）
        display_name:
          type: string
          description: 用户友好的显示名称
        is_default:
          type: boolean
          description: 是否为该提供商的默认模型
        enabled:
          type: boolean
          description: 是否启用
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AvailableModel:
      type: object
      properties:
        id:
          type: string
          description: 模型标识（如 gpt-4o）
        name:
          type: string
          description: 模型名称（如 GPT-4o）
        owned_by:
          type: string
          description: 模型所有者

    PredefinedModel:
      type: object
      properties:
        model_id:
          type: string
          description: 模型标识
        display_name:
          type: string
          description: 显示名称

    ConnectionTestResult:
      type: object
      properties:
        success:
          type: boolean
          description: 是否连接成功
        message:
          type: string
          description: 测试结果信息
        latency:
          type: integer
          description: 响应延迟（毫秒）

    # ---------- 对话相关 ----------
    Conversation:
      type: object
      properties:
        id:
          type: integer
          description: 对话 ID（自增）
        user_id:
          type: integer
          description: 所属用户 ID
        provider_model_id:
          type: string
          format: uuid
          description: 使用的提供商模型 ID
        model_id:
          type: integer
          description: 使用的模型 ID（已废弃）
          deprecated: true
        title:
          type: string
          description: 对话标题
        is_saved:
          type: boolean
          description: 是否已保存为笔记
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Message:
      type: object
      properties:
        id:
          type: integer
          description: 消息 ID（自增）
        conversation_id:
          type: integer
          description: 所属对话 ID
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
          description: 消息内容
        created_at:
          type: string
          format: date-time

    StreamChunk:
      type: object
      description: SSE 流式响应数据块
      properties:
        id:
          type: string
        object:
          type: string
        created:
          type: integer
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              delta:
                type: object
                properties:
                  content:
                    type: string
                  role:
                    type: string
              finish_reason:
                type: string
                nullable: true

    # ---------- 笔记相关 ----------
    Note:
      type: object
      properties:
        id:
          type: integer
          description: 笔记 ID（自增）
        user_id:
          type: integer
          description: 所属用户 ID
        folder_id:
          type: integer
          nullable: true
          description: 所属文件夹 ID
        title:
          type: string
          description: 笔记标题
        content:
          type: string
          description: 笔记内容（HTML 格式）
        tags:
          type: array
          items:
            $ref: '#/components/schemas/NoteTag'
          description: 标签列表
        source_conversation_id:
          type: integer
          nullable: true
          description: 来源对话 ID
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    NoteTag:
      type: object
      properties:
        note_id:
          type: integer
          description: 笔记 ID
        tag:
          type: string
          description: 标签名称
        created_at:
          type: string
          format: date-time

    NoteSummary:
      type: object
      description: 笔记列表项（不含完整内容）
      properties:
        id:
          type: integer
        folder_id:
          type: integer
          nullable: true
        title:
          type: string
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    GenerateNoteResponse:
      type: object
      properties:
        title:
          type: string
          description: AI 生成的标题
        content:
          type: string
          description: AI 生成的 Markdown 内容
        tags:
          type: array
          description: AI 建议的标签
          items:
            type: string

    # ---------- 文件夹相关 ----------
    Folder:
      type: object
      properties:
        id:
          type: integer
          description: 文件夹 ID（自增）
        user_id:
          type: integer
          description: 所属用户 ID
        name:
          type: string
          description: 文件夹名称
        parent_id:
          type: integer
          nullable: true
          description: 父文件夹 ID（支持嵌套）
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    FolderWithChildren:
      allOf:
        - $ref: '#/components/schemas/Folder'
        - type: object
          properties:
            children:
              type: array
              items:
                $ref: '#/components/schemas/FolderWithChildren'
              description: 子文件夹（递归结构）

    # ---------- 标签相关 ----------
    Tag:
      type: object
      properties:
        name:
          type: string
          description: 标签名称
        count:
          type: integer
          description: 使用该标签的笔记数量

# ============================================
# API 路径定义
# ============================================
paths:
  # ==========================================
  # 认证相关
  # ==========================================
  /auth/register:
    post:
      tags:
        - Auth
      summary: 用户注册
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  minLength: 8
                  example: password123
      responses:
        '201':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 邮箱已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags:
        - Auth
      summary: 用户登录
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  example: password123
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: 邮箱或密码错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags:
        - Auth
      summary: 用户登出
      operationId: logout
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
                  description: 刷新令牌（可选，传入后会使其失效）
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /auth/refresh:
    post:
      tags:
        - Auth
      summary: 刷新令牌
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh_token
              properties:
                refresh_token:
                  type: string
                  description: 刷新令牌
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: 新的 JWT Token
                  refresh_token:
                    type: string
                    description: 新的刷新令牌
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: 无效或过期的刷新令牌
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/me:
    get:
      tags:
        - Auth
      summary: 获取当前用户信息
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  # ==========================================
  # 用户设置
  # ==========================================
  /user/settings:
    get:
      tags:
        - User Settings
      summary: 获取用户设置
      description: 获取当前用户的会话记忆设置（上下文处理模式和记忆等级）
      operationId: getUserSettings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsResponse'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务器错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - User Settings
      summary: 更新用户设置
      description: 更新当前用户的会话记忆设置
      operationId: updateUserSettings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserSettingsRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsResponse'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务器错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==========================================
  # 提供商管理
  # ==========================================
  /providers:
    get:
      tags:
        - Providers
      summary: 获取提供商列表
      operationId: listProviders
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      $ref: '#/components/schemas/Provider'

    post:
      tags:
        - Providers
      summary: 创建提供商
      operationId: createProvider
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - type
                - api_base
                - api_key
              properties:
                name:
                  type: string
                  description: 显示名称
                  example: OpenAI (个人)
                type:
                  $ref: '#/components/schemas/ProviderType'
                api_base:
                  type: string
                  description: API 地址
                  example: https://api.openai.com/v1
                api_key:
                  type: string
                  description: API Key
                  example: sk-xxx
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  provider:
                    $ref: '#/components/schemas/Provider'

  /providers/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags:
        - Providers
      summary: 获取提供商详情
      operationId: getProvider
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Provider'

    put:
      tags:
        - Providers
      summary: 更新提供商
      operationId: updateProvider
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: OpenAI (工作)
                api_base:
                  type: string
                  example: https://api.openai.com/v1
                api_key:
                  type: string
                  description: 留空保持不变
                  example: sk-xxx
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  provider:
                    $ref: '#/components/schemas/Provider'

    delete:
      tags:
        - Providers
      summary: 删除提供商
      operationId: deleteProvider
      description: 删除提供商及其所有关联模型
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /providers/{id}/available-models:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags:
        - Providers
      summary: 获取可用模型列表
      operationId: getAvailableModels
      description: 动态从提供商 API 获取可用模型列表
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  models:
                    type: array
                    items:
                      $ref: '#/components/schemas/AvailableModel'
                  is_predefined:
                    type: boolean
                    description: 是否为预定义列表（非动态获取）
        '400':
          description: API 连接失败或认证错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /providers/{id}/predefined-models:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags:
        - Providers
      summary: 获取预定义模型列表
      operationId: getPredefinedModels
      description: 获取该提供商类型的预定义模型列表（用于不支持动态获取的提供商，如 Anthropic）
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  models:
                    type: array
                    items:
                      $ref: '#/components/schemas/PredefinedModel'

  /providers/{id}/test-connection:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    post:
      tags:
        - Providers
      summary: 测试连接
      operationId: testProviderConnection
      description: 测试提供商 API 连接是否正常
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                model_id:
                  type: string
                  description: 指定测试使用的模型 ID（可选）
      responses:
        '200':
          description: 测试完成
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionTestResult'

  /providers/{providerId}/models:
    parameters:
      - name: providerId
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags:
        - ProviderModels
      summary: 获取提供商的模型列表
      operationId: listProviderModels
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  models:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProviderModel'

    post:
      tags:
        - ProviderModels
      summary: 添加模型到提供商
      operationId: addProviderModel
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - model_id
              properties:
                model_id:
                  type: string
                  description: 模型标识
                  example: gpt-4o
                display_name:
                  type: string
                  description: 显示名称（可选）
                  example: GPT-4o
                is_default:
                  type: boolean
                  description: 是否设为默认
                  default: false
      responses:
        '201':
          description: 添加成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  model:
