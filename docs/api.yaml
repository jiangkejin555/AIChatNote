      tags:
        - Folders
      summary: 创建文件夹
      operationId: createFolder
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: 编程
                parent_id:
                  type: integer
                  description: 父文件夹 ID（可选）
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Folder'

  /folders/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer

    get:
      tags:
        - Folders
      summary: 获取文件夹详情
      operationId: getFolder
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Folder'

    put:
      tags:
        - Folders
      summary: 更新文件夹
      operationId: updateFolder
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: 编程笔记
                parent_id:
                  type: integer
                  description: 移动到其他父文件夹
                  nullable: true
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Folder'

    delete:
      tags:
        - Folders
      summary: 删除文件夹
      operationId: deleteFolder
      description: 删除文件夹，文件夹内的笔记的 folder_id 会被置空
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 删除成功

  /folders/{id}/copy:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer

    post:
      tags:
        - Folders
      summary: 复制文件夹
      operationId: copyFolder
      description: 复制文件夹及其所有内容（包括子文件夹和笔记）
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 复制成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Folder'

  # ==========================================
  # 标签
  # ==========================================
  /tags:
    get:
      tags:
        - Tags
      summary: 获取标签列表
      operationId: listTags
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tag'
